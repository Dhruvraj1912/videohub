<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Login - VideoHub</title>
    <link rel="stylesheet" href="/dist/style.css" />
  </head>

  <body
    class="flex justify-center items-center h-screen bg-gradient-to-br from-slate-900 to-black text-white transition-all duration-300"
  >
    <div class="glass p-10 rounded-xl w-96 shadow-lg">
      <h2 class="text-2xl mb-6 text-center font-semibold">Login</h2>

      <div class="space-y-3">
        <input
          id="email"
          type="email"
          placeholder="Email"
          class="w-full p-3 bg-white/10 rounded outline-none focus:ring-2 focus:ring-indigo-500"
        />

        <input
          id="phone"
          type="tel"
          placeholder="Phone Number"
          class="w-full p-3 bg-white/10 rounded outline-none focus:ring-2 focus:ring-indigo-500"
        />

        <input
          id="city"
          placeholder="State"
          class="w-full p-3 bg-white/10 rounded outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <input
          id="otp"
          placeholder="Enter OTP"
          class="w-full p-3 bg-white/10 rounded outline-none focus:ring-2 focus:ring-indigo-500 hidden"
        />

        <p id="otpNote" class="text-xs text-gray-400 hidden px-1"></p>

        <button
          id="sendOtpBtn"
          onclick="requestLogin()"
          class="w-full bg-indigo-600 py-3 rounded hover:bg-indigo-700 transition font-medium"
        >
          Send OTP
        </button>

        <button
          id="verifyBtn"
          onclick="verifyOTP()"
          class="w-full bg-green-600 py-3 rounded hover:bg-green-700 transition font-medium hidden"
        >
          Verify &amp; Login
        </button>
      </div>

      <p class="text-center mt-5 text-gray-400 text-sm">
        Don't have an account?
        <a href="/pages/register.html" class="text-blue-400 hover:underline"
          >Register</a
        >
      </p>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
  </body>
</html>
