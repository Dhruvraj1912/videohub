<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Register - VideoHub</title>
    <link rel="stylesheet" href="/dist/style.css" />
  </head>

  <body
    class="flex justify-center items-center h-screen bg-gradient-to-br from-slate-900 to-black text-white transition-all duration-300"
  >
    <div class="glass p-10 rounded-xl w-96 shadow-lg">
      <h2 class="text-2xl mb-6 text-center font-semibold">Register</h2>

      <form id="registerForm" class="space-y-3">
        <input
          id="name"
          placeholder="Full Name"
          class="w-full p-3 bg-white/10 rounded outline-none focus:ring-2 focus:ring-indigo-500"
        />

        <input
          id="email"
          type="email"
          placeholder="Email"
          class="w-full p-3 bg-white/10 rounded outline-none focus:ring-2 focus:ring-indigo-500"
        />

        <input
          id="city"
          placeholder="State"
          class="w-full p-3 bg-white/10 rounded outline-none focus:ring-2 focus:ring-indigo-500"
        />

        <input
          id="phone"
          type="tel"
          placeholder="Phone Number"
          class="w-full p-3 bg-white/10 rounded outline-none focus:ring-2 focus:ring-indigo-500"
        />

        <input
          id="password"
          type="password"
          placeholder="Password"
          class="w-full p-3 bg-white/10 rounded outline-none focus:ring-2 focus:ring-indigo-500"
        />

        <button
          type="submit"
          class="w-full bg-indigo-600 py-3 rounded hover:bg-indigo-700 transition font-medium"
        >
          Create Account
        </button>
      </form>

      <p class="text-center mt-4 text-gray-400 text-sm">
        Already have an account?
        <a href="/pages/login.html" class="text-blue-400 hover:underline"
          >Login</a
        >
      </p>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
  </body>
</html>
