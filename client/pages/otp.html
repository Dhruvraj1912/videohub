<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Verify OTP - VideoHub</title>
    <link rel="stylesheet" href="/dist/style.css" />
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fadeIn {
        animation: fadeIn 0.2s ease-in-out;
      }
    </style>
  </head>

  <body
    class="flex items-center justify-center min-h-screen bg-gradient-to-br from-slate-900 to-black text-white transition-all duration-300"
  >
    <div class="glass p-10 rounded-xl w-full max-w-md shadow-lg animate-fadeIn">
      <h2 class="text-3xl font-bold text-center mb-2">Verify OTP</h2>
      <p id="otpSubtitle" class="text-center text-gray-400 text-sm mb-6">
        Enter the OTP sent to you
      </p>

      <input
        type="email"
        id="email"
        placeholder="Your Email"
        class="w-full px-4 py-3 rounded bg-white/10 outline-none focus:ring-2 focus:ring-indigo-500 mb-3"
      />

      <input
        type="text"
        id="otpInput"
        placeholder="Enter 6-digit OTP"
        maxlength="6"
        class="w-full px-4 py-3 rounded bg-white/10 outline-none focus:ring-2 focus:ring-indigo-500 mb-4 tracking-widest text-center text-lg"
      />

      <button
        onclick="verifyOTP()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 py-3 rounded font-semibold transition"
      >
        Verify &amp; Login
      </button>

      <p class="mt-5 text-center text-gray-400 text-sm">
        <a href="/pages/login.html" class="text-indigo-400 hover:underline"
          >Back to Login</a
        >
      </p>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
  </body>
</html>
